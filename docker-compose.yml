services:
  db:
    image: postgres:16-alpine
    container_name: barrio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-barrio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barrio_dev}
      POSTGRES_DB: ${POSTGRES_DB:-barrio}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-barrio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: barrio_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Dentro do compose, o host do banco é o nome do serviço, não localhost
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
